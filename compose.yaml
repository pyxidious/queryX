services:
  queryx:
    build: .
    env_file:
      - .env
    environment:
      QUERYX_EXECUTION_MODE: worker
      MYSQL_QUERY_TIMEOUT_SECONDS: ${MYSQL_QUERY_TIMEOUT_SECONDS:-10}
      MONGODB_QUERY_TIMEOUT_SECONDS: ${MONGODB_QUERY_TIMEOUT_SECONDS:-10}
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - queryx_catalog:/app/data
      - ./benchmark:/app/benchmark
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  queryx-worker:
    build: .
    command: ["python", "-m", "queryx.app.worker"]
    env_file:
      - .env
    environment:
      QUERYX_EXECUTION_MODE: worker
      MYSQL_QUERY_TIMEOUT_SECONDS: ${MYSQL_QUERY_TIMEOUT_SECONDS:-10}
      MONGODB_QUERY_TIMEOUT_SECONDS: ${MONGODB_QUERY_TIMEOUT_SECONDS:-10}
    volumes:
      - queryx_catalog:/app/data
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/01-init.js:ro
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u $${MONGO_INITDB_ROOT_USERNAME} -p $${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  queryx_catalog:
  mysql_data:
  mongo_data:
